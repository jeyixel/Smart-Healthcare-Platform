spring.application.name=service-telemedicine
server.port=8085
spring.config.import=optional:file:.env[.properties]

# database configuration (use environment variables)
# Example DB_URL:
# jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?currentSchema=public&sslmode=require
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# For local development without the remote DB, create and use the 'local' profile
# (see src/main/resources/application-local.properties). Run with:
# .\mvnw.cmd -Dspring-boot.run.profiles=local spring-boot:run
