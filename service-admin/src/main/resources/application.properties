spring.application.name=service-admin
server.port=8087

# Load local env file when running from either service-admin/ or workspace root.
spring.config.import=optional:file:.env.local[.properties],optional:file:service-admin/.env.local[.properties]

# Dedicated database for admin service.
spring.datasource.url=${ADMIN_DB_URL:jdbc:postgresql://localhost:5432/admin_db}
spring.datasource.username=${ADMIN_DB_USERNAME:postgres}
spring.datasource.password=${ADMIN_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${ADMIN_DB_DDL_AUTO:update}
spring.jpa.show-sql=${ADMIN_DB_SHOW_SQL:false}
spring.jpa.properties.hibernate.default_schema=${ADMIN_DB_SCHEMA:admin_schema}
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Upstream patient service configuration.
patient.service.base-url=${PATIENT_SERVICE_BASE_URL:http://localhost:8081}
patient.service.endpoints.set-status=${PATIENT_SERVICE_SET_STATUS_ENDPOINT:/api/v1/internal/patients/{patientId}/status}
patient.service.endpoints.upsert-prescription=${PATIENT_SERVICE_UPSERT_PRESCRIPTION_ENDPOINT:/api/v1/internal/prescription-snapshots}

management.endpoints.web.exposure.include=health,info

# JWT Security
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 24 hours in milliseconds
application.security.jwt.expiration=86400000
# 7 days in milliseconds
application.security.jwt.refresh-token.expiration=604800000
